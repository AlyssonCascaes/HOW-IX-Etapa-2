<!DOCTYPE html>
<html>
<head>
    <title>Cadastro - Denúncias Urbanas Itajaí</title>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="CSS/estilo_denuncia.css">
</head>
<body>
    <div class="container-login">
        <h2>Criar conta</h2>
        <form id="form-cadastro">
            <input type="text"     id="nome"  placeholder="Nome completo">
            <span class="erro" id="erro-nome"></span>
            <input type="email"    id="email" placeholder="E-mail">
            <span class="erro" id="erro-email"></span>
            <input type="password" id="senha" placeholder="Senha (mínimo 4 caracteres)">
            <span class="erro" id="erro-senha"></span>
            <button type="submit">Cadastrar</button>
        </form>
        <p class="link-login">
            Já tem uma conta? <a href="login.html">Entrar</a>
        </p>
    </div>
    <script>
        function notificar(mensagem, tipo) {
    const div = document.createElement("div");
    div.className = "toast toast-" + (tipo || "info");
    div.textContent = mensagem;
    document.body.appendChild(div);
    setTimeout(() => div.classList.add("show"), 10);
    setTimeout(() => {
        div.classList.remove("show");
        setTimeout(() => div.remove(), 300);
    }, 3000);
}
        const form = document.getElementById("form-cadastro");
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            const nome  = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim().toLowerCase();
            const senha = document.getElementById("senha").value;
            const erroNome  = document.getElementById("erro-nome");
            const erroEmail = document.getElementById("erro-email");
            const erroSenha = document.getElementById("erro-senha");
            erroNome.textContent  = "";
            erroEmail.textContent = "";
            erroSenha.textContent = "";
            let valido = true;
            if (nome === "") {
                erroNome.textContent = "Informe seu nome";
                valido = false;
            }
            if (email === "" || !email.includes("@")) {
                erroEmail.textContent = "Informe um e-mail válido";
                valido = false;
            }
            if (senha.length < 4) {
                erroSenha.textContent = "A senha precisa ter pelo menos 4 caracteres";
                valido = false;
            }
            if (!valido) return;
            // Pega a lista de usuários já salvos (ou cria uma vazia)
            const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
            // Verifica se o e-mail já está cadastrado
            const jaExiste = usuarios.some(u => u.email === email);
            if (jaExiste) {
                erroEmail.textContent = "Este e-mail já está cadastrado";
                return;
            }
            // Adiciona o novo usuário
            usuarios.push({ nome: nome, email: email, senha: senha });
            localStorage.setItem("usuarios", JSON.stringify(usuarios));
            notificar("Cadastro realizado com sucesso!", "sucesso");
            setTimeout(() => { window.location.href = "login.html"; }, 1000);
        });
    </script>
</body>
</html>
